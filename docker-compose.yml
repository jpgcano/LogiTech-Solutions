version: '3.8'

services:
  db:
    image: postgres:15
    container_name: logitech_postgres
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD:-123456}
    ports:
      - "${PG_HOST_PORT:-5432}:5432"

  mongodb:
    image: mongo:latest
    container_name: logitech_mongo
    ports:
      - "${MONGO_HOST_PORT:-27017}:27017"

  api:
    build: ./api
    container_name: logitech_api
    ports:
      - "${API_HOST_PORT:-3000}:3000"
    environment:
      - POSTGRES_URL=postgresql://postgres:123456@db:5432/postgres
      - MONGO_URL=mongodb://mongodb:27017/megastore
    depends_on:
      - db
      - mongodb

  client:
    build: ./client
    container_name: logitech_web
    ports:
      - "${WEB_HOST_PORT:-8080}:80"
    depends_on:
      - api